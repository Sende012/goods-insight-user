# =============================================
# application.yml
# 1) 先声明 nacos.config.* （远程配置源信息，process 启动时通过 EnvironmentPostProcessor 远程拉取）
# 2) 远程配置优先（highest precedence），本地作为兜底
# =============================================
server:
  port: 8082

spring:
  application:
    name: goods-insight-user
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/goods_insight_user?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:}
  # 邮件服务（密码重置验证码）
  # 未配置时 EmailService.send 会失败 → resetPassword 链路会报"邮件发送失败"
  mail:
    host: ${MAIL_SMTP_HOST:smtp.example.com}
    port: ${MAIL_SMTP_PORT:465}
    username: ${MAIL_SMTP_USER:noreply@example.com}
    password: ${MAIL_SMTP_PASS:change-me}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# Nacos 配置中心（自定义加载器读取这一段去远程拉 yaml）
nacos:
  config:
    server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
    namespace: ${NACOS_NAMESPACE:8992d51f-46c9-4b02-927a-5264454ec2f8}
    data-id: ${NACOS_DATA_ID:goods-insight-user.yaml}
    group: ${NACOS_GROUP:DEFAULT_GROUP}
    timeout-ms: 5000

# Dubbo 配置（应用级，不进 Nacos）
dubbo:
  application:
    name: goods-insight-user
    qos-enable: false
  registry:
    address: nacos://${NACOS_SERVER_ADDR:127.0.0.1:8848}
    group: DEFAULT_GROUP
  protocol:
    name: dubbo
    port: 20880
  scan:
    base-packages: com.sende.user.service.impl
  consumer:
    timeout: 5000
    check: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sende.user
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 业务配置（Nacos 优先）
app:
  jwt:
    secret: ${APP_JWT_SECRET:dev-secret-key-please-change-in-production-min-32-chars}
    expire-seconds: 86400
  # 邮件业务配置
  email:
    from: ${MAIL_SMTP_USER:noreply@example.com}
    from-name: ${MAIL_FROM_NAME:Goods Insight}
    reset-subject: ${MAIL_RESET_SUBJECT:【Goods Insight】密码重置验证码}

logging:
  level:
    com.sende.user: debug
    org.apache.dubbo: info
    com.alibaba.nacos: info